name: Build Bai 1 MathUtils

on: [push, pull_request]

jobs:
  build-bai-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build MathUtils with Maven
        run: |
          cd bai9.1
          mvn clean compile test