name: Java CI with Maven (Full Project)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # Thuê máy ảo Ubuntu sạch của GitHub

    steps:
    - uses: actions/checkout@v4 # Lấy toàn bộ code từ Repo của mày bỏ vào máy ảo

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test All Modules
      # Lệnh này sẽ quét file pom.xml ở gốc và thực thi tất cả các folder con
      run: mvn clean package -DskipTests=false

    - name: Run Bai 9.8 Execution (Optional)
      # Đây là bước chạy thử file JAR của bài 9.8 để hiện kết quả thực thi
      run: java -jar bai9.8/target/bai9.8-1.0-SNAPSHOT.jar || echo "Bai 9.8 chưa có file JAR hoặc lỗi thực thi"
 
